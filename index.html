<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axeltopia | Official Website</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.image2url.com/r2/default/audio/1778740326621-854fe3ca-f8d2-4db9-896b-2397cd02fb94.m4a" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="logo-section">
            <img src="https://discord.com/channels/1503385931116183572/1503531185807032320/1504370931982798928" alt="Logo GTPS" class="logo">
        </div>

        <div class="card border-highlight">
            <div class="server-stats">
                <div class="status-item">
                    <span id="status-dot" class="dot"></span>
                    <span id="status-text">Loading...</span>
                </div>
                <div class="status-item">
                    <i class="fas fa-users"></i>
                    <span id="player-online">0 / %</span>
                </div>
            </div>
        </div>

        <div class="spacer"></div>

        <div class="card border-highlight">
            <h2 class="section-title">Server Team Management</h2>
            
            <div class="team-category">
                <h3>Founders</h3>
                <div class="team-member">
                    <img src="https://cdn.discordapp.com/attachments/1503531185807032320/1504371154364792923/7f0a7aaf9839df52091d29b2604e1932.jpg?ex=6a06be51&is=6a056cd1&hm=b22c66f8a1416197bcbd30f3bdd69ac079fc015b65908b81590e055062a7ffba&" class="pfp">
                    <div class="member-info">
                        <p class="growid">shine</p>
                        <p class="discord">@shinegengsta</p>
                    </div>
                </div>
            </div>

            <div class="team-category">
                <h3>Co-Founders</h3>
                <div class="team-member">
                    <img src="LINK_FOTO_EMPTY" class="pfp">
                    <div class="member-info"><p class="growid">Empty</p><p class="discord">@Empty</p></div>
                </div>
            </div>
            </div>

        <div class="spacer"></div>

        <div class="card border-highlight">
            <h2 class="section-title">Connection Hosts</h2>
            <div class="host-item">
                <span>PowerTunnel (Android)</span>
                <button onclick="copyHost('LINK_HOST_1')">Copy</button>
            </div>
            <div class="host-item">
                <span>Surge 5 (iOS)</span>
                <button onclick="copyHost('LINK_HOST_2')">Copy</button>
            </div>
        </div>

        <div class="spacer"></div>

        <div class="card border-highlight">
            <h2 class="section-title">Community</h2>
            <a href="LINK_WA" class="social-link"><i class="fab fa-whatsapp"></i> WhatsApp Group</a>
            <a href="https://discord.gg/HDt7eDFqsq" class="social-link"><i class="fab fa-discord"></i> Discord Server</a>
        </div>

        <div class="spacer"></div>

        <div class="card border-highlight">
            <h2 class="section-title">Server Purchase</h2>
            <div class="pricelist">
                <img src="URL_FOTO_PRICELIST" class="price-img">
                <p class="price-text">Role VIP: Rp. 50.000</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
