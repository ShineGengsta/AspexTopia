<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#b0e0e6">
    <title>GTPS | Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Warna request: 176, 224, 230 */
            --primary: rgba(176, 224, 230, 1);
            --primary-glow: rgba(176, 224, 230, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary); /* Full BG Color sesuai request */
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            margin-top: 2rem;
            animation: fadeInScale 0.8s ease-out forwards;
        }

        .game-title-img {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        .section {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 4px solid var(--primary); /* Border Color sesuai request */
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .status-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .status-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: #2c3e50;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.2rem;
            border-radius: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-main {
            grid-column: 1 / -1;
            background: #2c3e50;
            color: white;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-sub {
            background: white;
            color: #2c3e50;
        }

        .btn-sub:hover {
            background: rgba(255,255,255,0.8);
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: auto;
            padding: 2rem 0;
        }

        .social-link {
            font-size: 3rem;
            color: white;
            transition: 0.3s;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }

        .social-link:hover {
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .btn-grid { grid-template-columns: 1fr; }
            .game-title-img { max-width: 300px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="header">
            <img src="game_title.png" alt="Game Title" class="game-title-img">
        </header>

        <main class="section">
            <img src="newget.png" alt="Promo" class="w-32 mx-auto mb-8 block rounded-xl">

            <div class="status-card">
                <div class="status-title">SERVER STATUS</div>
                <div id="gtps-api">
                    <span class="font-bold text-gray-700">Online: </span>
                    <span id="player-count" class="font-black text-blue-600">0</span>
                </div>
            </div>

            <div class="btn-grid">
                <a href="#" class="btn btn-main">
                    <i class="fas fa-download"></i> DOWNLOAD GAME
                </a>
                <a href="#" class="btn btn-sub">
                    <i class="fas fa-user-plus"></i> REGISTER
                </a>
                <a href="#" class="btn btn-sub">
                    <i class="fas fa-store"></i> STORE
                </a>
            </div>
        </main>

        <div class="footer-social">
            <a href="LINK_DISCORD" class="social-link"><i class="fab fa-discord"></i></a>
            <a href="LINK_WA" class="social-link"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

</body>
</html>
