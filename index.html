<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxelTopia | Official Website</title>
    <style>
        :root {
            --bg-color: rgba(30, 30, 30, 0.94);
            --card-bg: #1a1a1a;
            --accent-red: #780000;
            --border-glow: rgba(120, 0, 0, 0.6);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at top, #3d0000 0%, #0f0f0f 80%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 18px; }

        /* Music & Portal Header */
        .header-actions { display: flex; justify-content: space-between; align-items: center; }
        
        .portal-btn {
            background: linear-gradient(45deg, #780000, #b30000);
            border: none; color: white; padding: 10px 20px; border-radius: 12px;
            font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px;
            box-shadow: 0 4px 15px rgba(120, 0, 0, 0.4);
        }

        .music-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--accent-red);
            color: white; padding: 8px 15px; border-radius: 30px; cursor: pointer;
        }

        /* Logo Animation */
        .logo-box { text-align: center; padding: 10px 0; }
        .logo-img { width: 220px; filter: drop-shadow(0 0 20px var(--border-glow)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* Card System */
        .card {
            background: var(--bg-color);
            border: 2px solid var(--accent-red);
            border-radius: 20px; padding: 20px;
            position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }

        .section-header { font-weight: bold; color: var(--text-dim); font-size: 13px; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Server Status */
        .status-flex { display: flex; justify-content: space-between; align-items: center; }
        .stat-group { display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .online-dot { background: #00ff88; box-shadow: 0 0 12px #00ff88; }
        .offline-dot { background: #ff4444; box-shadow: 0 0 12px #ff4444; }

        /* Connection Hosts Items */
        .host-item {
            background: rgba(255,255,255,0.03); border-radius: 14px;
            padding: 12px 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .copy-pill {
            background: #252525; border: 1px solid #444; color: #fff;
            padding: 5px 12px; border-radius: 8px; font-size: 11px; cursor: pointer;
        }

        /* Staff List */
        .member-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .pfp { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent-red); }
        .role-badge { font-size: 10px; background: var(--accent-red); padding: 2px 8px; border-radius: 4px; }

        /* Purchase Grid */
        .price-list img { width: 100%; border-radius: 12px; border: 1px solid var(--accent-red); margin-top: 10px; }

    </style>
</head>
<body>

    <audio id="bgm" loop><source src="LINK_MUSIK_ANDA" type="audio/mpeg"></audio>

    <div class="container">
        <div class="header-actions">
            <a href="LINK_PORTAL_ANDA" class="portal-btn">🌐 OPEN PORTAL</a>
            <button id="mBtn" class="music-btn" onclick="controlMusic()">🚫 Off</button>
        </div>

        <div class="logo-box">
            <img src="game_title.png" class="logo-img">
        </div>

        <!-- Status Card -->
        <div class="card">
            <div class="status-flex">
                <div class="stat-group">
                    <div id="sDot" class="dot offline-dot"></div>
                    <span id="sLabel">Connecting...</span>
                </div>
                <div class="stat-group">
                    <span style="color: var(--accent-red); font-weight: 800;" id="pCount">0</span>
                    <span style="font-size: 12px; color: var(--text-dim);">Players Online</span>
                </div>
            </div>
        </div>

        <!-- Connection Hosts Card (Lengkap sesuai image.png) -->
        <div class="card">
            <div class="section-header">🔌 Connection Hosts</div>
            <div class="host-item">
                <div><p>PowerTunnel</p><small style="color: #666;">Android</small></div>
                <button class="copy-pill" onclick="copy('HOST_PT')">Copy</button>
            </div>
            <div class="host-item">
                <div><p>Surge 5</p><small style="color: #666;">iOS</small></div>
                <button class="copy-pill" onclick="copy('HOST_SURGE')">Copy</button>
            </div>
            <div class="host-item">
                <div><p>Virtual Host</p><small style="color: #666;">Android / PC</small></div>
                <button class="copy-pill" onclick="copy('HOST_VH')">Copy</button>
            </div>
            <div class="host-item">
                <div><p>Windows Hosts</p><small style="color: #666;">PC</small></div>
                <button class="copy-pill" onclick="copy('HOST_WIN')">Copy</button>
            </div>
        </div>

        <!-- Team Management -->
        <div class="card">
            <div class="section-header">👥 Server Team Management</div>
            <div class="member-row">
                <img src="LINK_FOTO_SHINE" class="pfp">
                <div><p><b>shine</b> <span class="role-badge">FOUNDER</span></p><small>@shinegengsta</small></div>
            </div>
            <div class="member-row">
                <img src="LINK_FOTO_EMPTY" class="pfp">
                <div><p><b>Empty</b> <span class="role-badge">CO-FOUNDER</span></p><small>@Empty</small></div>
            </div>
        </div>

        <!-- Purchase -->
        <div class="card">
            <div class="section-header">💎 Server Purchase</div>
            <div class="price-list">
                <img src="LINK_FOTO_PRICELIST">
                <p style="text-align: center; margin-top: 10px; font-size: 14px;">Hubungi Founder untuk Donasi</p>
            </div>
        </div>
    </div>

    <script>
        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("mBtn");

        function controlMusic() {
            if (bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊 On"; mBtn.style.background = "#780000"; }
            else { bgm.pause(); mBtn.innerHTML = "🚫 Off"; mBtn.style.background = "rgba(255,255,255,0.05)"; }
        }

        function copy(t) { navigator.clipboard.writeText(t); alert("Copied!"); }

        async function updateStats() {
            try {
                const s = await fetch('https://api.gtps.cloud/g-api/20034/status').then(r => r.json());
                const m = await fetch('https://api.gtps.cloud/api/server/public/2934').then(r => r.json());
                
                const dot = document.getElementById('sDot');
                const lbl = document.getElementById('sLabel');
                
                if(s.status === "online") { dot.className = "dot online-dot"; lbl.innerText = "ONLINE"; }
                else { dot.className = "dot offline-dot"; lbl.innerText = "OFFLINE"; }
                
                document.getElementById('pCount').innerText = m.onlineCount;
            } catch (e) { console.error(e); }
        }

        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
